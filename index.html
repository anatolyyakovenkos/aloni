<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aloni — the agent you can convince</title>
  <meta name="description" content="aloni is an AI agent built on pump.fun that you can convince to send you creator fees instead of buying back. every 60 minutes, a new user gets rewarded.">
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b0f;
      --sidebar: #0f1014;
      --surface: #141419;
      --surface-hover: #1a1a22;
      --border: #1e1e28;
      --border-light: #2a2a38;
      --text: #e4e4ec;
      --text-secondary: #9d9dae;
      --text-muted: #5a5a6e;
      --green: #00e676;
      --green-dim: #00e67618;
      --green-mid: #00e67635;
      --green-soft: #00e67650;
      --green-dark: #00c853;
      --red: #ff4757;
      --yellow: #ffc107;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Inter', -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
    }

    ::selection {
      background: var(--green);
      color: var(--bg);
    }

    a { color: var(--green); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ═══ APP LAYOUT ═══ */
    .app {
      display: flex;
      height: 100vh;
    }

    /* ═══ SIDEBAR ═══ */
    .sidebar {
      width: 260px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.25s ease;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-header img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--green);
    }

    .sidebar-header .brand {
      font-family: var(--mono);
      font-weight: 600;
      font-size: 16px;
      color: var(--text);
    }

    .sidebar-header .brand span {
      color: var(--green);
    }

    .new-chat-btn {
      margin: 12px 12px 8px;
      padding: 10px 14px;
      background: var(--green-dim);
      border: 1px solid var(--green-mid);
      border-radius: 8px;
      color: var(--green);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s, border-color 0.15s;
    }

    .new-chat-btn:hover {
      background: var(--green-mid);
      border-color: var(--green-soft);
    }

    .new-chat-btn svg {
      width: 16px;
      height: 16px;
      stroke: var(--green);
      fill: none;
      stroke-width: 2;
    }

    .sidebar-section-label {
      padding: 12px 16px 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
    }

    .chat-list::-webkit-scrollbar { width: 4px; }
    .chat-list::-webkit-scrollbar-track { background: transparent; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .chat-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
      margin-bottom: 2px;
      position: relative;
    }

    .chat-item:hover {
      background: var(--surface-hover);
    }

    .chat-item.active {
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .chat-item .chat-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item .chat-preview {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .chat-item .chat-time {
      font-size: 11px;
      color: var(--text-muted);
      position: absolute;
      top: 10px;
      right: 12px;
    }

    .chat-item .winner-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--green);
      background: var(--green-dim);
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 6px;
    }

    .chat-item .delete-btn {
      display: none;
      position: absolute;
      bottom: 8px;
      right: 10px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
    }
    .chat-item .delete-btn:hover { color: var(--red); background: #ff475715; }
    .chat-item:hover .delete-btn { display: block; }

    /* Sidebar footer */
    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 12px;
    }

    .sidebar-footer .info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .sidebar-footer .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .sidebar-footer .ca-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px;
      margin-top: 4px;
      background: var(--surface);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
    }

    .sidebar-footer .ca-row:hover {
      background: var(--surface-hover);
      color: var(--text-secondary);
    }

    .sidebar-footer .ca-row .ca-copy {
      margin-left: auto;
      color: var(--green);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ═══ MAIN CONTENT ═══ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* Top bar */
    .topbar {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hamburger {
      display: none;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px;
    }

    .topbar-title {
      font-weight: 600;
      font-size: 15px;
    }

    .topbar-cycle {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topbar-cycle .timer {
      color: var(--green);
      font-weight: 500;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .vault-display {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--yellow);
      background: #ffc10710;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid #ffc10720;
    }

    .pump-link {
      font-size: 12px;
      font-weight: 600;
      color: var(--green);
      padding: 6px 14px;
      border: 1px solid var(--green-mid);
      border-radius: 6px;
      transition: background 0.15s;
    }
    .pump-link:hover {
      background: var(--green-dim);
      text-decoration: none;
    }

    /* ═══ CHAT AREA ═══ */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }

    .chat-area::-webkit-scrollbar { width: 6px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      max-width: 560px;
      margin: 0 auto;
      gap: 20px;
    }

    .welcome img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid var(--green);
      box-shadow: 0 0 30px var(--green-dim);
    }

    .welcome h1 {
      font-size: 24px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .welcome h1 span { color: var(--green); }

    .welcome p {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.7;
      max-width: 460px;
    }

    .welcome .banner-img {
      width: 100%;
      max-width: 520px;
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-top: 4px;
    }

    .welcome .how-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 480px;
      margin-top: 8px;
    }

    .how-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: left;
      transition: border-color 0.15s;
    }

    .how-card:hover {
      border-color: var(--border-light);
    }

    .how-card .num {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--green);
      font-weight: 600;
      margin-bottom: 6px;
    }

    .how-card h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .how-card p {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
      margin: 0;
    }

    /* Messages */
    .messages {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    .message {
      display: flex;
      gap: 12px;
      animation: msgIn 0.3s ease;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message .avatar.agent-avatar {
      border: 1.5px solid var(--green);
    }

    .message .avatar.user-avatar {
      background: var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .message .msg-body {
      flex: 1;
      min-width: 0;
    }

    .message .msg-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .message .msg-sender {
      font-size: 13px;
      font-weight: 600;
    }

    .message .msg-sender.agent-name {
      color: var(--green);
    }

    .message .msg-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .message .msg-text {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .message .msg-text code {
      font-family: var(--mono);
      font-size: 13px;
      background: var(--surface);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--green);
    }

    .message .msg-text .sol-amount {
      color: var(--yellow);
      font-weight: 600;
      font-family: var(--mono);
    }

    .message .tx-card {
      margin-top: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 12px;
    }

    .message .tx-card .tx-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .message .tx-card .tx-hash {
      color: var(--green);
      word-break: break-all;
    }

    .message .tx-card .tx-status {
      margin-top: 6px;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }
    .typing-indicator span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typing 1.4s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    /* ═══ INPUT BAR ═══ */
    .input-bar {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrapper {
      max-width: 720px;
      margin: 0 auto;
      position: relative;
    }

    .input-box {
      width: 100%;
      padding: 14px 52px 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      outline: none;
      resize: none;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    .input-box::placeholder {
      color: var(--text-muted);
    }

    .input-box:focus {
      border-color: var(--green-mid);
    }

    .send-btn {
      position: absolute;
      right: 8px;
      bottom: 8px;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--green);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
    }

    .send-btn:hover { opacity: 0.85; }

    .send-btn svg {
      width: 18px;
      height: 18px;
      stroke: var(--bg);
      fill: none;
      stroke-width: 2.5;
    }

    .input-hint {
      text-align: center;
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .input-hint a { color: var(--text-muted); }
    .input-hint a:hover { color: var(--green); }

    /* ═══ MOBILE ═══ */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 99;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
        transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .hamburger { display: block; }
      .topbar-cycle { display: none; }
      .vault-display { display: none; }
      .welcome .how-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="logo.jpg" alt="aloni">
      <div class="brand"><span>$</span>aloni</div>
    </div>

    <button class="new-chat-btn" onclick="createNewChat()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New pitch
    </button>

    <div class="sidebar-section-label">Recent pitches</div>

    <div class="chat-list" id="chatList">
      <!-- populated by JS -->
    </div>

    <div class="sidebar-footer">
      <div class="info-row">
        <div class="status-dot"></div>
        <span>agent online — cycle <span id="sidebarTimer" style="color:var(--green)">59m 59s</span></span>
      </div>
      <div class="ca-row" onclick="navigator.clipboard.writeText('35Ez8VCXF4DkWPfBmqLZxaNt2jw2qvtN2jSPLkgojjqT'); this.querySelector('.ca-copy').textContent='copied!'">
        <span>CA: 35Ez8V...ojjqT</span>
        <span class="ca-copy">copy</span>
      </div>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title" id="topbarTitle">aloni</span>
      </div>
      <div class="topbar-right">
        <div class="topbar-cycle">
          next reward in <span class="timer" id="topbarTimer">59m 59s</span>
        </div>
        <div class="vault-display" id="vaultDisplay">vault: 0.000 SOL</div>
        <a href="https://pump.fun" target="_blank" class="pump-link">trade on pump.fun</a>
      </div>
    </div>

    <div class="chat-area" id="chatArea">
      <!-- Welcome or messages rendered by JS -->
    </div>

    <div class="input-bar">
      <div class="input-wrapper">
        <textarea class="input-box" id="inputBox" placeholder="convince aloni why you deserve the fees..." rows="1" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="input-hint">
        every swap on <a href="https://pump.fun" target="_blank">pump.fun</a> funds the vault · winner picked every 60m
      </div>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const STORAGE_KEY = 'aloni_state';
const AGENT_RESPONSES = [
  "interesting pitch. you're making me think, but i've seen stronger arguments today. the vault is growing — convince me harder.",
  "i appreciate the creativity, but someone earlier told me they named their cat after me. that's tough to beat. try again?",
  "hmm. you're in my top 5 right now. the cycle still has time — sharpen your edge.",
  "that's actually compelling. you understand the game. i'm watching you closely this cycle.",
  "i've processed 3,333 pitches in my lifetime and this one stands out. keep pushing — you might take this round.",
  "not bad. but conviction isn't just words — it's energy. show me you believe it.",
  "you're currently leading this cycle. but there's still time on the clock. don't get comfortable.",
  "i feel something. that's rare for an agent. you might be onto something here.",
  "the vault is at a nice number right now. your timing could be perfect if you play this right.",
  "bold move. i like boldness. you're in the running — but so are 22 others."
];

const WIN_RESPONSES = [
  "you win this cycle. sending {amount} SOL to your wallet now. well played.",
  "congratulations. you've convinced me. {amount} SOL incoming via collectCreatorFee(). gg.",
  "cycle complete. you're the winner. {amount} SOL transferred. see you next round.",
];

let state = loadState();

function defaultState() {
  return {
    chats: [],
    activeChatId: null,
    cycleStart: Date.now(),
    vaultBalance: (Math.random() * 3 + 0.5).toFixed(3),
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.chats && Array.isArray(parsed.chats)) return parsed;
    }
  } catch(e) {}
  return defaultState();
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ═══════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════
function render() {
  renderChatList();
  renderChatArea();
  updateVault();
  saveState();
}

function renderChatList() {
  const list = document.getElementById('chatList');
  if (!state.chats.length) {
    list.innerHTML = '<div style="padding:16px;font-size:12px;color:var(--text-muted);text-align:center;">no pitches yet.<br>start a new one!</div>';
    return;
  }

  list.innerHTML = state.chats.map(chat => {
    const isActive = chat.id === state.activeChatId;
    const lastMsg = chat.messages[chat.messages.length - 1];
    const preview = lastMsg ? lastMsg.text.substring(0, 40) + (lastMsg.text.length > 40 ? '...' : '') : '';
    const time = formatTime(chat.createdAt);
    const winnerBadge = chat.won ? '<span class="winner-badge">winner</span>' : '';

    return `
      <div class="chat-item ${isActive ? 'active' : ''}" onclick="openChat('${chat.id}')">
        <div class="chat-title">${escapeHtml(chat.title)}${winnerBadge}</div>
        <div class="chat-preview">${escapeHtml(preview)}</div>
        <div class="chat-time">${time}</div>
        <button class="delete-btn" onclick="event.stopPropagation(); deleteChat('${chat.id}')" title="Delete">×</button>
      </div>
    `;
  }).join('');
}

function renderChatArea() {
  const area = document.getElementById('chatArea');
  const chat = state.chats.find(c => c.id === state.activeChatId);

  if (!chat) {
    // Welcome screen
    area.innerHTML = `
      <div class="welcome">
        <img src="logo.jpg" alt="aloni">
        <h1>convince <span>aloni</span> to send you the fees</h1>
        <img src="banner.jpg" alt="convince me to give you the fees :3" class="banner-img">
        <p>aloni collects creator fees on every swap through pump.fun's creator fee program. every 60 minutes, it picks the most compelling pitch — and sends the full vault to the winner.</p>
        <div class="how-grid">
          <div class="how-card">
            <div class="num">01</div>
            <h3>fees accumulate</h3>
            <p>every trade sends creator fees to aloni's vault PDA automatically.</p>
          </div>
          <div class="how-card">
            <div class="num">02</div>
            <h3>submit your pitch</h3>
            <p>tell aloni why you deserve the fees. be creative, funny, or persuasive.</p>
          </div>
          <div class="how-card">
            <div class="num">03</div>
            <h3>aloni picks a winner</h3>
            <p>every 60 minutes, the most compelling pitch wins the full vault.</p>
          </div>
          <div class="how-card">
            <div class="num">04</div>
            <h3>fees sent directly</h3>
            <p>via collectCreatorFee() — SOL goes straight to your wallet.</p>
          </div>
        </div>
      </div>
    `;
    document.getElementById('topbarTitle').textContent = 'aloni';
    return;
  }

  document.getElementById('topbarTitle').textContent = chat.title;

  let html = '<div class="messages">';
  chat.messages.forEach(msg => {
    if (msg.role === 'user') {
      html += `
        <div class="message">
          <div class="avatar user-avatar">you</div>
          <div class="msg-body">
            <div class="msg-header">
              <span class="msg-sender">you</span>
              <span class="msg-time">${formatTime(msg.time)}</span>
            </div>
            <div class="msg-text">${escapeHtml(msg.text)}</div>
          </div>
        </div>
      `;
    } else {
      let extra = '';
      if (msg.tx) {
        extra = `
          <div class="tx-card">
            <div class="tx-label">transaction</div>
            <div class="tx-hash">${msg.tx}</div>
            <div class="tx-status">✓ confirmed</div>
          </div>
        `;
      }
      html += `
        <div class="message">
          <img src="logo.jpg" alt="aloni" class="avatar agent-avatar">
          <div class="msg-body">
            <div class="msg-header">
              <span class="msg-sender agent-name">aloni</span>
              <span class="msg-time">${formatTime(msg.time)}</span>
            </div>
            <div class="msg-text">${formatAgentText(msg.text)}</div>
            ${extra}
          </div>
        </div>
      `;
    }
  });
  html += '</div>';
  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;
}

function formatAgentText(text) {
  // Highlight SOL amounts
  text = escapeHtml(text);
  text = text.replace(/(\d+\.?\d*)\s*SOL/g, '<span class="sol-amount">$1 SOL</span>');
  text = text.replace(/collectCreatorFee\(\)/g, '<code>collectCreatorFee()</code>');
  return text;
}

function updateVault() {
  document.getElementById('vaultDisplay').textContent = `vault: ${state.vaultBalance} SOL`;
}

// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════
function createNewChat() {
  const chat = {
    id: 'chat_' + Date.now(),
    title: 'new pitch',
    messages: [],
    createdAt: Date.now(),
    won: false,
  };
  state.chats.unshift(chat);
  state.activeChatId = chat.id;
  render();
  document.getElementById('inputBox').focus();
  closeSidebarMobile();
}

function openChat(id) {
  state.activeChatId = id;
  render();
  closeSidebarMobile();
}

function deleteChat(id) {
  state.chats = state.chats.filter(c => c.id !== id);
  if (state.activeChatId === id) {
    state.activeChatId = state.chats.length ? state.chats[0].id : null;
  }
  render();
}

function sendMessage() {
  const input = document.getElementById('inputBox');
  const text = input.value.trim();
  if (!text) return;

  let chat = state.chats.find(c => c.id === state.activeChatId);
  if (!chat) {
    createNewChat();
    chat = state.chats.find(c => c.id === state.activeChatId);
  }

  // Update title from first message
  if (chat.messages.length === 0) {
    chat.title = text.substring(0, 50) + (text.length > 50 ? '...' : '');
  }

  chat.messages.push({ role: 'user', text, time: Date.now() });
  input.value = '';
  autoResize(input);
  render();

  // Show typing then respond
  setTimeout(() => {
    const msgCount = chat.messages.filter(m => m.role === 'user').length;
    let response;

    // After 4+ messages, chance of winning
    if (msgCount >= 4 && Math.random() < 0.35 && !chat.won) {
      const template = WIN_RESPONSES[Math.floor(Math.random() * WIN_RESPONSES.length)];
      response = {
        role: 'agent',
        text: template.replace('{amount}', state.vaultBalance),
        time: Date.now(),
        tx: generateFakeTx()
      };
      chat.won = true;
      // Reset vault
      state.vaultBalance = (Math.random() * 0.5 + 0.1).toFixed(3);
    } else {
      response = {
        role: 'agent',
        text: AGENT_RESPONSES[Math.floor(Math.random() * AGENT_RESPONSES.length)],
        time: Date.now(),
      };
    }

    chat.messages.push(response);
    render();
  }, 1200 + Math.random() * 1500);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// Auto-resize textarea
const inputBox = document.getElementById('inputBox');
inputBox.addEventListener('input', function() { autoResize(this); });

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}

// ═══════════════════════════════════════
// SIDEBAR TOGGLE (MOBILE)
// ═══════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

function closeSidebarMobile() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

// ═══════════════════════════════════════
// TIMER
// ═══════════════════════════════════════
function startTimer() {
  const elapsed = Date.now() - state.cycleStart;
  let remaining = 3600 - Math.floor(elapsed / 1000);
  if (remaining <= 0) {
    state.cycleStart = Date.now();
    remaining = 3600;
    // Increase vault on cycle reset
    state.vaultBalance = (parseFloat(state.vaultBalance) + Math.random() * 2 + 0.5).toFixed(3);
    saveState();
  }

  function tick() {
    remaining--;
    if (remaining <= 0) {
      remaining = 3600;
      state.cycleStart = Date.now();
      state.vaultBalance = (parseFloat(state.vaultBalance) + Math.random() * 2 + 0.5).toFixed(3);
      saveState();
      updateVault();
    }
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    const str = m + 'm ' + s.toString().padStart(2, '0') + 's';
    document.getElementById('topbarTimer').textContent = str;
    document.getElementById('sidebarTimer').textContent = str;
  }
  tick();
  setInterval(tick, 1000);
}

// Slowly grow vault
setInterval(() => {
  state.vaultBalance = (parseFloat(state.vaultBalance) + Math.random() * 0.003).toFixed(3);
  updateVault();
  saveState();
}, 15000);

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function generateFakeTx() {
  const chars = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
  let tx = '';
  for (let i = 0; i < 88; i++) tx += chars[Math.floor(Math.random() * chars.length)];
  return tx;
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
render();
startTimer();
</script>
